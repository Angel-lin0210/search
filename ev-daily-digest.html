<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>電動車生態每日觀察</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0a0e14;
            --bg-secondary: #141922;
            --bg-card: #1a1f2e;
            --accent-primary: #00d9ff;
            --accent-secondary: #7b61ff;
            --text-primary: #e6e8eb;
            --text-secondary: #8b92a4;
            --text-muted: #5a6070;
            --border: #2a3240;
            --success: #00ff9f;
            --warning: #ffd600;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Sans TC', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
            overflow-x: hidden;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        header {
            margin-bottom: 60px;
            position: relative;
        }

        .header-bg {
            position: absolute;
            top: -100px;
            left: -100px;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, var(--accent-primary) 0%, transparent 70%);
            opacity: 0.1;
            filter: blur(80px);
            pointer-events: none;
        }

        h1 {
            font-size: 3.5rem;
            font-weight: 900;
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
            letter-spacing: -0.02em;
            position: relative;
        }

        .subtitle {
            font-size: 1.1rem;
            color: var(--text-secondary);
            font-weight: 300;
            font-family: 'JetBrains Mono', monospace;
        }

        .last-update {
            display: inline-block;
            margin-top: 20px;
            padding: 8px 16px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 6px;
            font-size: 0.9rem;
            color: var(--text-muted);
            font-family: 'JetBrains Mono', monospace;
        }

        .controls {
            display: flex;
            gap: 15px;
            margin-bottom: 40px;
            flex-wrap: wrap;
        }

        button {
            padding: 14px 28px;
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            color: var(--bg-primary);
            border: none;
            border-radius: 8px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Noto Sans TC', sans-serif;
            position: relative;
            overflow: hidden;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(0, 217, 255, 0.3);
        }

        button:active {
            transform: translateY(0);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-secondary {
            background: var(--bg-card);
            color: var(--text-primary);
            border: 1px solid var(--border);
        }

        .btn-secondary:hover {
            background: var(--bg-secondary);
            box-shadow: 0 5px 20px rgba(255, 255, 255, 0.1);
        }

        .loading {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-secondary);
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 3px solid var(--border);
            border-top-color: var(--accent-primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .topics-grid {
            display: grid;
            gap: 30px;
        }

        .topic-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 30px;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .topic-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 4px;
            height: 100%;
            background: linear-gradient(180deg, var(--accent-primary), var(--accent-secondary));
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .topic-card:hover {
            border-color: var(--accent-primary);
            transform: translateX(5px);
        }

        .topic-card:hover::before {
            opacity: 1;
        }

        .topic-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 20px;
        }

        .topic-title {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .topic-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
        }

        .topic-category {
            display: inline-block;
            padding: 4px 12px;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 20px;
            font-size: 0.85rem;
            color: var(--text-secondary);
            font-weight: 500;
        }

        .topic-summary {
            margin-bottom: 25px;
            padding-left: 52px;
        }

        .summary-text {
            color: var(--text-secondary);
            line-height: 1.8;
            margin-bottom: 15px;
        }

        .key-points {
            margin-top: 20px;
        }

        .key-points h4 {
            font-size: 0.9rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 12px;
            font-weight: 600;
        }

        .key-points ul {
            list-style: none;
            padding: 0;
        }

        .key-points li {
            padding: 10px 0;
            padding-left: 25px;
            position: relative;
            color: var(--text-secondary);
            border-bottom: 1px solid var(--border);
        }

        .key-points li:last-child {
            border-bottom: none;
        }

        .key-points li::before {
            content: '→';
            position: absolute;
            left: 0;
            color: var(--accent-primary);
            font-weight: bold;
        }

        .extended-questions {
            margin-top: 30px;
            padding: 25px;
            background: var(--bg-secondary);
            border-radius: 8px;
            border-left: 3px solid var(--accent-secondary);
        }

        .extended-questions h4 {
            font-size: 1rem;
            color: var(--accent-primary);
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .extended-questions h4::before {
            content: '💡';
        }

        .question-list {
            list-style: none;
            padding: 0;
        }

        .question-list li {
            padding: 12px 0;
            color: var(--text-primary);
            font-weight: 500;
            display: flex;
            align-items: flex-start;
            gap: 10px;
        }

        .question-number {
            min-width: 24px;
            height: 24px;
            background: var(--accent-secondary);
            color: var(--bg-primary);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
            font-weight: 700;
            margin-top: 2px;
        }

        .sources {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid var(--border);
        }

        .sources h5 {
            font-size: 0.85rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 10px;
        }

        .source-links {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .source-link {
            display: inline-block;
            padding: 6px 12px;
            background: var(--bg-primary);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--accent-primary);
            text-decoration: none;
            font-size: 0.85rem;
            transition: all 0.2s ease;
            font-family: 'JetBrains Mono', monospace;
        }

        .source-link:hover {
            border-color: var(--accent-primary);
            background: var(--bg-secondary);
        }

        .empty-state {
            text-align: center;
            padding: 80px 20px;
            color: var(--text-secondary);
        }

        .empty-state-icon {
            font-size: 4rem;
            margin-bottom: 20px;
            opacity: 0.3;
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 2.5rem;
            }

            .topic-card {
                padding: 20px;
            }

            .topic-summary {
                padding-left: 0;
            }

            .topic-icon {
                width: 32px;
                height: 32px;
                font-size: 1rem;
            }
        }

        .fade-in {
            animation: fadeIn 0.5s ease-in;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="header-bg"></div>
            <h1>電動車生態每日觀察</h1>
            <p class="subtitle">EV Ecosystem Daily Digest</p>
            <div class="last-update" id="lastUpdate">最後更新: 尚未執行</div>
        </header>

        <div class="controls">
            <button id="fetchBtn" onclick="fetchDailyDigest()">🔄 立即更新資訊</button>
            <button class="btn-secondary" onclick="exportReport()">📥 匯出報告</button>
            <button class="btn-secondary" onclick="toggleHistory()">📚 歷史記錄</button>
        </div>

        <div id="content">
            <div class="empty-state">
                <div class="empty-state-icon">⚡</div>
                <h3>準備好開始追蹤電動車產業動態</h3>
                <p>點擊「立即更新資訊」開始搜集今日最新資訊</p>
            </div>
        </div>
    </div>

    <script>
        const TOPICS = {
            policy: { icon: '📋', name: '政策法規', category: '政策' },
            tech: { icon: '🔬', name: '技術發展', category: '技術' },
            business: { icon: '💼', name: '商業模式', category: '商業' },
            ux: { icon: '👥', name: '使用者體驗', category: '體驗' }
        };

        const KEYWORDS = {
            ev: '電動車',
            management: '管委會',
            ems: 'EMS 能源管理',
            charger: '充電樁',
            electricity: '電價'
        };

        async function fetchDailyDigest() {
            const btn = document.getElementById('fetchBtn');
            const content = document.getElementById('content');
            
            btn.disabled = true;
            btn.textContent = '⏳ 搜集中...';
            
            content.innerHTML = '<div class="loading"><div class="spinner"></div><p>正在搜尋最新資訊...</p></div>';

            try {
                const response = await fetch("https://api.anthropic.com/v1/messages", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                    },
                    body: JSON.stringify({
                        model: "claude-sonnet-4-20250514",
                        max_tokens: 4000,
                        system: `你是專業的電動車產業分析師。請搜集最新的台灣及國際電動車相關資訊,包含:
                        - 電動車產業動態
                        - 管委會與充電設施相關法規
                        - EMS 能源管理系統
                        - 充電樁基礎建設
                        - 電價政策

                        請按照以下四個面向分類整理:
                        1. 政策法規變化
                        2. 技術發展趨勢
                        3. 商業模式創新
                        4. 使用者體驗問題

                        針對每個面向,提供:
                        - 簡潔摘要(100字內)
                        - 3-5個關鍵重點
                        - 3-5個可延伸討論的深度問題

                        **請以純 JSON 格式回應,不要包含任何其他文字或 Markdown 標記**,格式如下:
                        {
                          "policy": {
                            "summary": "...",
                            "keyPoints": ["...", "..."],
                            "questions": ["...", "..."],
                            "sources": [{"title": "...", "url": "..."}]
                          },
                          "tech": {...},
                          "business": {...},
                          "ux": {...}
                        }`,
                        messages: [
                            { 
                                role: "user", 
                                content: `請搜尋並整理今天(${new Date().toLocaleDateString('zh-TW')})關於電動車、管委會、EMS、充電樁、電價的最新資訊。` 
                            }
                        ],
                        tools: [
                            {
                                "type": "web_search_20250305",
                                "name": "web_search"
                            }
                        ]
                    })
                });

                const data = await response.json();
                console.log('API Response:', data);
                
                let result;
                const textContent = data.content
                    .filter(item => item.type === 'text')
                    .map(item => item.text)
                    .join('\n');
                
                try {
                    const cleanJson = textContent
                        .replace(/```json\n?/g, '')
                        .replace(/```\n?/g, '')
                        .trim();
                    result = JSON.parse(cleanJson);
                } catch (e) {
                    console.error('JSON Parse Error:', e);
                    throw new Error('無法解析搜尋結果');
                }

                displayResults(result);
                
                document.getElementById('lastUpdate').textContent = 
                    `最後更新: ${new Date().toLocaleString('zh-TW')}`;
                
                // 儲存到 localStorage
                saveToHistory(result);

            } catch (error) {
                console.error('Error:', error);
                content.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">⚠️</div>
                        <h3>搜集失敗</h3>
                        <p>${error.message}</p>
                    </div>
                `;
            } finally {
                btn.disabled = false;
                btn.textContent = '🔄 立即更新資訊';
            }
        }

        function displayResults(data) {
            const content = document.getElementById('content');
            let html = '<div class="topics-grid">';

            Object.keys(TOPICS).forEach((key, index) => {
                const topic = TOPICS[key];
                const topicData = data[key];
                
                if (!topicData) return;

                html += `
                    <div class="topic-card fade-in" style="animation-delay: ${index * 0.1}s">
                        <div class="topic-header">
                            <div class="topic-title">
                                <div class="topic-icon">${topic.icon}</div>
                                ${topic.name}
                            </div>
                            <div class="topic-category">${topic.category}</div>
                        </div>
                        
                        <div class="topic-summary">
                            <p class="summary-text">${topicData.summary || '暫無資料'}</p>
                            
                            ${topicData.keyPoints && topicData.keyPoints.length > 0 ? `
                                <div class="key-points">
                                    <h4>關鍵重點</h4>
                                    <ul>
                                        ${topicData.keyPoints.map(point => `<li>${point}</li>`).join('')}
                                    </ul>
                                </div>
                            ` : ''}
                        </div>

                        ${topicData.questions && topicData.questions.length > 0 ? `
                            <div class="extended-questions">
                                <h4>延伸討論</h4>
                                <ul class="question-list">
                                    ${topicData.questions.map((q, i) => `
                                        <li>
                                            <span class="question-number">${i + 1}</span>
                                            ${q}
                                        </li>
                                    `).join('')}
                                </ul>
                            </div>
                        ` : ''}

                        ${topicData.sources && topicData.sources.length > 0 ? `
                            <div class="sources">
                                <h5>資料來源</h5>
                                <div class="source-links">
                                    ${topicData.sources.map(s => `
                                        <a href="${s.url}" class="source-link" target="_blank">${s.title}</a>
                                    `).join('')}
                                </div>
                            </div>
                        ` : ''}
                    </div>
                `;
            });

            html += '</div>';
            content.innerHTML = html;
        }

        function saveToHistory(data) {
            const history = JSON.parse(localStorage.getItem('evDigestHistory') || '[]');
            history.unshift({
                date: new Date().toISOString(),
                data: data
            });
            // 只保留最近 30 天
            if (history.length > 30) history.pop();
            localStorage.setItem('evDigestHistory', JSON.stringify(history));
        }

        function exportReport() {
            const history = JSON.parse(localStorage.getItem('evDigestHistory') || '[]');
            if (history.length === 0) {
                alert('尚無資料可匯出');
                return;
            }
            
            const blob = new Blob([JSON.stringify(history, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `ev-digest-${new Date().toISOString().split('T')[0]}.json`;
            a.click();
        }

        function toggleHistory() {
            alert('歷史記錄功能開發中...');
        }
    </script>
</body>
</html>
