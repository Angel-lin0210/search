Anam: Daily EV Digest

on:
  schedule:
    # 每天早上 6:00 執行 (UTC 22:00 = 台灣時間 06:00)
    - cron: '0 22 * * *'
  workflow_dispatch: # 允許手動觸發

jobs:
  fetch-and-send:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install

      - name: Fetch daily digest
        run: node fetch-digest.js
        env:
           ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
           NEW_API_TOKEN: ${{ secrets.NEW_API_TOKEN }}
           GMAIL_USER: ${{ secrets.GMAIL_USER }}
           GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
           RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}

      - name: Commit and push results
        run: |
          git config --global user.name 'GitHub Actions'
          git config --global user.email 'actions@github.com'
          git add -A
          git diff --quiet && git diff --staged --quiet || (git commit -m "Daily digest $(date +'%Y-%m-%d')" && git push)
          git diff --quiet && git diff --staged --quiet || (git commit -m "Daily digest $(date +'%Y-%m-%d')" && git push)
